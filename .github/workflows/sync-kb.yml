name: Sync Staffbase KB

on:
  push:
    branches:
      - main
  schedule:
    # 09:00 JST = 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: python -m pip install --upgrade pip requests

      - name: Fetch latest Staffbase URLs
        run: python fetch_staffbase.py

      - name: Commit and push when changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add staffbase_urls.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync KB URLs [skip ci]"
            git push
          else
            echo "No changes in staffbase_urls.md"
          fi
